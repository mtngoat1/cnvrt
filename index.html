<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cnvrt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --white:#f5f5f3;
    --mist:rgba(255,255,255,0.045);
    --hairline:rgba(255,255,255,0.11);
    --hairline-soft:rgba(255,255,255,0.06);
    --muted:rgba(245,245,243,0.42);
    --muted-2:rgba(245,245,243,0.62);
    --glow:rgba(255,255,255,0.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--black);
    color:var(--white);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
    overflow-x:hidden;
    position:relative;
  }

  /* ambient breathing ether */
  .ether{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .ether::before, .ether::after{
    content:'';
    position:absolute;
    width:60vmax;
    height:60vmax;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%);
    animation:breathe 11s ease-in-out infinite;
  }
  .ether::before{ top:-20vmax; left:-15vmax; animation-delay:0s; }
  .ether::after{ bottom:-25vmax; right:-15vmax; animation-delay:-5.5s; }
  @keyframes breathe{
    0%,100%{ transform:scale(0.85); opacity:0.55; }
    50%{ transform:scale(1.15); opacity:1; }
  }
  @media (prefers-reduced-motion: reduce){
    .ether::before, .ether::after{ animation:none; }
  }

  .container{
    position:relative;
    z-index:1;
    width:100%;
    max-width:420px;
    background:var(--mist);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--hairline);
    border-radius:2px;
    padding:48px 40px 40px;
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    font-weight:300;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
    margin-bottom:14px;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;
    font-style:italic;
    font-size:42px;
    letter-spacing:0.03em;
    text-align:center;
    color:var(--white);
    margin-bottom:6px;
  }
  .subtitle{
    text-align:center;
    font-size:12px;
    font-weight:300;
    letter-spacing:0.04em;
    color:var(--muted);
    margin-bottom:36px;
  }

  .field{
    margin-top:26px;
  }
  label{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    font-weight:300;
    text-transform:uppercase;
    letter-spacing:0.2em;
    color:var(--muted);
    margin-bottom:10px;
  }

  /* underline-style text input, no boxes */
  input[type="text"]{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--hairline);
    color:var(--white);
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:300;
    padding:8px 2px 10px;
    letter-spacing:0.01em;
    transition:border-color 0.4s ease;
  }
  input[type="text"]::placeholder{ color:rgba(245,245,243,0.28); }
  input[type="text"]:focus{
    outline:none;
    border-color:rgba(255,255,255,0.55);
  }

  /* segmented format toggle */
  .segmented{
    display:flex;
    border:1px solid var(--hairline);
    border-radius:1px;
    overflow:hidden;
  }
  .segmented button{
    flex:1;
    background:transparent;
    border:none;
    color:var(--muted-2);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding:11px 0;
    cursor:pointer;
    transition:background 0.35s ease, color 0.35s ease;
    border-right:1px solid var(--hairline-soft);
  }
  .segmented button:last-child{ border-right:none; }
  .segmented button.active{
    background:rgba(255,255,255,0.09);
    color:var(--white);
  }
  .segmented button:hover:not(.active){
    color:var(--white);
  }

  /* quality selects - underline style, fade swap */
  .quality-wrap{ position:relative; min-height:44px; }
  select{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--hairline);
    color:var(--white);
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:300;
    padding:8px 20px 10px 2px;
    cursor:pointer;
    transition:opacity 0.35s ease, border-color 0.35s ease;
  }
  select:focus{ outline:none; border-color:rgba(255,255,255,0.55); }
  select option{ background:#0a0a0a; color:var(--white); }

  .quality-group{
    position:absolute;
    top:0; left:0; right:0;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.35s ease;
  }
  .quality-group.visible{
    position:relative;
    opacity:1;
    pointer-events:auto;
  }

  .select-arrow{
    position:relative;
  }
  .select-arrow::after{
    content:'';
    position:absolute;
    right:2px;
    top:14px;
    width:7px;
    height:7px;
    border-right:1px solid var(--muted);
    border-bottom:1px solid var(--muted);
    transform:rotate(45deg);
    pointer-events:none;
  }

  /* destination */
  .dest-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:10px;
  }
  .dest-btn{
    flex-shrink:0;
    background:transparent;
    border:1px solid var(--hairline);
    color:var(--white);
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding:9px 16px;
    cursor:pointer;
    transition:border-color 0.3s ease, background 0.3s ease;
  }
  .dest-btn:hover{ background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.4); }
  .dest-path{
    font-size:12px;
    font-weight:300;
    color:var(--muted-2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
    letter-spacing:0.02em;
  }
  .dest-note{
    margin-top:8px;
    font-size:10.5px;
    font-weight:300;
    color:rgba(245,245,243,0.3);
    letter-spacing:0.02em;
  }

  button.primary{
    width:100%;
    margin-top:36px;
    background:var(--white);
    color:#000;
    border:none;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.25em;
    text-transform:uppercase;
    padding:15px 0;
    cursor:pointer;
    transition:box-shadow 0.4s ease, opacity 0.3s ease, transform 0.2s ease;
  }
  button.primary:hover{
    box-shadow:0 0 28px var(--glow);
  }
  button.primary:active{ transform:scale(0.995); }
  button.primary:disabled{
    background:rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.4);
    cursor:not-allowed;
    box-shadow:none;
  }

  #status{
    margin-top:22px;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:300;
    letter-spacing:0.04em;
    color:var(--muted-2);
    min-height:16px;
    opacity:0;
    transition:opacity 0.4s ease;
  }
  #status.show{ opacity:1; }
  #status.error{ color:#fff; }
  #status.error::before{ content:'✕  '; }
  #status.success::before{ content:'✓  '; }
  #status.info::before{ content:'·  '; }

  ::selection{ background:rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div class="ether"></div>

<div class="container">
  <div class="eyebrow">private media transfer</div>
  <h1>cnvrt</h1>
  <div class="subtitle">paste a link, choose a form, let it arrive</div>

  <div class="field">
    <label for="urlInput">Source link</label>
    <input type="text" id="urlInput" placeholder="https://…" autocomplete="off">
  </div>

  <div class="field">
    <label>Format</label>
    <div class="segmented">
      <button type="button" id="mp4Btn" class="active" data-format="mp4">Video · MP4</button>
      <button type="button" id="mp3Btn" data-format="mp3">Audio · MP3</button>
    </div>
  </div>

  <div class="field">
    <label id="qualityLabel">Max quality</label>
    <div class="quality-wrap">
      <div class="quality-group visible select-arrow" id="videoQualityGroup">
        <select id="videoQuality">
          <option value="1080">1080p</option>
          <option value="720" selected>720p</option>
          <option value="480">480p</option>
        </select>
      </div>
      <div class="quality-group select-arrow" id="audioQualityGroup">
        <select id="audioQuality">
          <option value="320">320 kbps</option>
          <option value="256" selected>256 kbps</option>
          <option value="128">128 kbps</option>
        </select>
      </div>
    </div>
  </div>

  <div class="field">
    <label>Destination</label>
    <div class="dest-row">
      <button type="button" class="dest-btn" id="folderBtn">Choose folder</button>
      <div class="dest-path" id="destPath">default downloads</div>
    </div>
    <div class="dest-note" id="destNote"></div>
  </div>

  <button class="primary" id="goBtn">Download</button>
  <div id="status"></div>
</div>

<script>
  const urlInput = document.getElementById('urlInput');
  const mp4Btn = document.getElementById('mp4Btn');
  const mp3Btn = document.getElementById('mp3Btn');
  const videoQualityGroup = document.getElementById('videoQualityGroup');
  const audioQualityGroup = document.getElementById('audioQualityGroup');
  const videoQuality = document.getElementById('videoQuality');
  const audioQuality = document.getElementById('audioQuality');
  const qualityLabel = document.getElementById('qualityLabel');
  const folderBtn = document.getElementById('folderBtn');
  const destPath = document.getElementById('destPath');
  const destNote = document.getElementById('destNote');
  const goBtn = document.getElementById('goBtn');
  const statusDiv = document.getElementById('status');

  let currentFormat = 'mp4';
  let dirHandle = null;
  const supportsFSAccess = 'showDirectoryPicker' in window;

  if (!supportsFSAccess) {
    destNote.textContent = 'Folder selection isn\'t supported in this browser — files will save to your default downloads location.';
  }

  function setFormat(fmt) {
    currentFormat = fmt;
    mp4Btn.classList.toggle('active', fmt === 'mp4');
    mp3Btn.classList.toggle('active', fmt === 'mp3');
    videoQualityGroup.classList.toggle('visible', fmt === 'mp4');
    audioQualityGroup.classList.toggle('visible', fmt === 'mp3');
    qualityLabel.textContent = fmt === 'mp3' ? 'Audio quality' : 'Max quality';
  }
  mp4Btn.addEventListener('click', () => setFormat('mp4'));
  mp3Btn.addEventListener('click', () => setFormat('mp3'));

  function updateStatus(text, type) {
    statusDiv.textContent = text;
    statusDiv.className = 'show ' + type;
  }

  folderBtn.addEventListener('click', async () => {
    if (!supportsFSAccess) {
      updateStatus('This browser can\'t choose a folder — files will go to Downloads.', 'info');
      return;
    }
    try {
      dirHandle = await window.showDirectoryPicker();
      destPath.textContent = dirHandle.name;
      destNote.textContent = '';
    } catch (err) {
      // user cancelled the picker — leave prior selection intact
    }
  });

  async function saveBlob(blob, filename) {
    if (dirHandle) {
      try {
        const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        return true;
      } catch (err) {
        // permission may have been revoked or handle is stale — fall back below
      }
    }
    const downloadUrl = window.URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = downloadUrl;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    window.URL.revokeObjectURL(downloadUrl);
    return false;
  }

  async function processMedia() {
    const rawUrl = urlInput.value.trim();
    if (!rawUrl) { updateStatus('Paste a link first.', 'error'); return; }

    const quality = currentFormat === 'mp3' ? audioQuality.value : videoQuality.value;

    goBtn.disabled = true;
    updateStatus('Retrieving from source…', 'info');

    try {
      const response = await fetch('https://onrender.com', {

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: rawUrl, format: currentFormat, quality })
});


      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Extraction failed.');
      }

      const blob = await response.blob();
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      const filename = currentFormat === 'mp3' ? `audio-${stamp}.mp3` : `video-${stamp}.mp4`;

      const savedToChosenFolder = await saveBlob(blob, filename);
      updateStatus(
        savedToChosenFolder ? `Saved to ${dirHandle.name}.` : 'Saved to your downloads.',
        'success'
      );
    } catch (err) {
      updateStatus(err.message, 'error');
    }
    goBtn.disabled = false;
  }
  goBtn.addEventListener('click', processMedia);
</script>
</body>
</html>
