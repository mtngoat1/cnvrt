<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cnvrt - Private Media Transfer</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --container-bg: #16161a;
            --accent-color: #722ed1;
            --accent-hover: #531dab;
            --text-main: #f0f0f5;
            --text-muted: #94a3b8;
            --border-color: #2e2e33;
            --success-color: #52c41a;
            --error-color: #ff4d4f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .toggle-group {
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--text-main);
        }

        .select-wrapper {
            position: relative;
        }

        select {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        .go-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .go-btn:hover {
            background-color: var(--accent-hover);
        }

        .go-btn:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        .status-box.success {
            display: block;
            background-color: rgba(82, 196, 26, 0.15);
            color: var(--success-color);
        }

        .status-box.error {
            display: block;
            background-color: rgba(255, 77, 79, 0.15);
            color: var(--error-color);
        }

        .status-box.info {
            display: block;
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>cnvrt</h1>
    <p class="subtitle">private media transfer</p>

    <div class="form-group">
        <label for="urlInput">Source Link</label>
        <input type="text" id="urlInput" placeholder="Paste media URL here...">
    </div>

    <div class="form-group">
        <label>Format</label>
        <div class="toggle-group">
            <button class="toggle-btn active" id="mp4Btn">Video · MP4</button>
            <button class="toggle-btn" id="mp3Btn">Audio · MP3</button>
        </div>
    </div>

    <div class="form-group" id="qualityGroup">
        <label for="qualitySelect">Max Quality Target</label>
        <div class="select-wrapper">
            <select id="qualitySelect">
                <option value="1080">1080p (Full HD)</option>
                <option value="720" selected>720p (HD)</option>
                <option value="480">480p (SD)</option>
            </select>
        </div>
    </div>

    <button class="go-btn" id="goBtn">Download & Convert</button>
    <div class="status-box" id="statusBox"></div>
</div>

<script>
    const urlInput = document.getElementById('urlInput');
    const mp4Btn = document.getElementById('mp4Btn');
    const mp3Btn = document.getElementById('mp3Btn');
    const qualityGroup = document.getElementById('qualityGroup');
    const qualitySelect = document.getElementById('qualitySelect');
    const goBtn = document.getElementById('goBtn');
    const statusBox = document.getElementById('statusBox');

    let currentFormat = 'mp4';

    mp4Btn.addEventListener('click', () => {
        currentFormat = 'mp4';
        mp4Btn.classList.add('active');
        mp3Btn.classList.remove('active');
        qualityGroup.style.display = 'block';
    });

    mp3Btn.addEventListener('click', () => {
        currentFormat = 'mp3';
        mp3Btn.classList.add('active');
        mp4Btn.classList.remove('active');
        qualityGroup.style.display = 'none';
    });

    function updateStatus(message, type) {
        statusBox.className = `status-box ${type}`;
        statusBox.innerText = message;
    }

    async function processMedia() {
        const rawUrl = urlInput.value.trim();

        if (!rawUrl) {
            updateStatus('Please input a valid web link source.', 'error');
            return;
        }

        goBtn.disabled = true;
        updateStatus('Connecting to extraction server node...', 'info');

        try {
            // Target the relative API path managed securely by server.js
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: rawUrl, format: currentFormat })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || 'Server extraction pipeline failed.');
            }

            const result = await response.json();

            if (result && result.downloadUrl) {
                updateStatus('Transfer verified! Opening file...', 'success');

                // Generate browser trigger point to fetch direct file attachment
                const downloadLink = document.createElement('a');
                downloadLink.href = result.downloadUrl;
                downloadLink.setAttribute('download', '');
                downloadLink.setAttribute('target', '_blank');
                
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                updateStatus('Saved to your local downloads folder.', 'success');
            } else {
                throw new Error(result.error || 'The system could not parse a valid download stream URL.');
            }

        } catch (err) {
            updateStatus(err.message, 'error');
        }
        goBtn.disabled = false;
    }

    goBtn.addEventListener('click', processMedia);
</script>

</body>
</html>
